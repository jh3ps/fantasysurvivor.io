<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survivor 50 Fantasy Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #c62828;
            --accent: #fbc02d;
            --dark: #212121;
            --light: #f5f5f5;
            --card: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 0;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
            color: white;
            border-bottom: 4px solid var(--primary);
        }

        .nav-tabs {
            background: var(--dark);
            display: flex;
            justify-content: center;
            gap: 5px;
            padding: 10px 10px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tab-btn {
            background: #444;
            color: #bbb;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .tab-btn.active {
            background: var(--light);
            color: var(--primary);
        }

        .content-section {
            display: none;
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .content-section.active { display: block; }

        .card {
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            padding: 20px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #eee; color: #777; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #eee; }

        .rank { font-weight: bold; color: var(--primary); width: 40px; }
        .score { font-weight: bold; text-align: right; }
        
        .tag {
            display: inline-block;
            padding: 3px 8px;
            background: #f0f0f0;
            border-radius: 12px;
            font-size: 0.75rem;
            margin: 2px;
            border: 1px solid #ddd;
        }

        .search-bar {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        #loading { text-align: center; padding: 100px; font-weight: bold; color: #666; }
    </style>
</head>
<body>

    <header>
        <h1>SURVIVOR 50 FANTASY</h1>
        <p>Live League Standings & Scoring</p>
    </header>

    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="openTab('standings')">STAND
