<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survivor 50 Fantasy League</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css">
    <style>
        body { color: #333; line-height: 1.6; background-color: #fcfcfc; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        header { border-bottom: 1px solid #eee; margin-bottom: 30px; padding-bottom: 10px; }
        h1 { margin: 0; color: #1f8dd6; font-weight: 300; }
        
        /* Navigation */
        .pure-menu-horizontal { background: #fff; border: 1px solid #eee; border-radius: 4px; margin-bottom: 20px; }
        .pure-menu-link:hover { background: #f8f8f8; }
        .pure-menu-selected .pure-menu-link { background: #1f8dd6; color: white; }

        /* Tables */
        .pure-table { width: 100%; margin-bottom: 30px; background: white; }
        .pure-table thead { background-color: #f2f2f2; color: #555; }
        .num { text-align: right !important; font-family: monospace; font-size: 1.1em; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        footer { margin-top: 50px; font-size: 0.8em; color: #888; text-align: center; border-top: 1px solid #eee; padding-top: 20px; }
        @media (max-width: 480px) { .hide-mobile { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Survivor 50 Fantasy</h1>
        <p>Live League Standings & Scoring</p>
    </header>

    <div class="pure-menu pure-menu-horizontal">
        <ul class="pure-menu-list">
            <li class="pure-menu-item pure-menu-selected" id="li-leaderboard">
                <a href="#" class="pure-menu-link" onclick="openTab('leaderboard')">Leaderboard</a>
            </li>
            <li class="pure-menu-item" id="li-teams">
                <a href="#" class="pure-menu-link" onclick="openTab('teams')">Teams</a>
            </li>
            <li class="pure-menu-item" id="li-scoring">
                <a href="#" class="pure-menu-link" onclick="openTab('scoring')">Scoring</a>
            </li>
        </ul>
    </div>

    <div id="leaderboard" class="tab-content active">
        <table class="pure-table pure-table-horizontal pure-table-striped">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Manager</th>
                    <th class="hide-mobile">Team Name</th>
                    <th class="num">Total Pts</th>
                </tr>
            </thead>
            <tbody id="tbody-standings"></tbody>
        </table>
    </div>

    <div id="teams" class="tab-content">
        <table class="pure-table pure-table-horizontal">
            <thead>
                <tr>
                    <th>Manager</th>
                    <th>Roster</th>
                </tr>
            </thead>
            <tbody id="tbody-teams"></tbody>
        </table>
    </div>

    <div id="scoring" class="tab-content">
        <table class="pure-table pure-table-horizontal pure-table-striped" style="max-width: 400px;">
            <thead>
                <tr>
                    <th>Survivor</th>
                    <th class="num">Individual Pts</th>
                </tr>
            </thead>
            <tbody id="tbody-players"></tbody>
        </table>
    </div>

    <footer>
        <p>Edit index.html on GitHub to update weekly scores.</p>
    </footer>
</div>

<script>
    /* =========================================================
       EDIT DATA BELOW TO UPDATE THE WEBSITE
       =========================================================
    */

    // 1. UPDATE SURVIVOR POINTS HERE
    const SURVIVOR_SCORES = {
        "Jenna": 0,
        "Cirie": 9,
        "Ozzy": 5,
        "Christian": 8,
        "Devens": 9,
        "Aubry": 12,
        "Kamilla": 11,
        "Jonathan": 11,
        "Colby": 12,
        "Coach": 11,
        "Genevieve": 12,
        "Q": 6,
        "Rizo": 12,
        "Angelina": 7,
        "Charlie": 11,
        "Mike": 7,
        "Emily": 5,
        "Joe": 9,
        "Tiffany": 10,
        "Stephanie": 7,
        "Dee": 10,
        "Chrissy": 11,
        "Kyle": 5,
        "Savannah": 1
    };

    // 2. TEAM ROSTERS (From your spreadsheet)
    const LEAGUE_DATA = [
        { owner: "Josh", team: "Come and Get It", picks: ["Genevieve", "Q", "Emily", "Devens"] },
        { owner: "Ben", team: "Jeff Probst's Knife", picks: ["Colby", "Coach", "Genevieve", "Q"] },
        { owner: "Briggs", team: "Probst Blue Ribbon", picks: ["Coach", "Stephanie", "Aubry", "Jonathan"] },
        { owner: "Quinn", team: "The Big Jackpot", picks: ["Ozzy", "Rizo", "Q", "Christian"] },
        { owner: "Megan", team: "Genevieve's New Group Project", picks: ["Charlie", "Genevieve", "Ozzy", "Devens"] },
        { owner: "Kadie", team: "Rockin' the Hammock", picks: ["Charlie", "Christian", "Ozzy", "Genevieve"] },
        { owner: "Devon", team: "Financial Analyst Emily Flippen Fan Account", picks: ["Emily", "Devens", "Cirie", "Christian"] },
        { owner: "Samuel", team: "Q-Rona", picks: ["Kamilla", "Ozzy", "Christian", "Q"] },
        { owner: "Zoe", team: "Run, Climb, Puzzle", picks: ["Tiffany", "Ozzy", "Kamilla", "Cirie"] },
        { owner: "Ana", team: "B-b-b-beautiful", picks: ["Devens", "Aubry", "Kamilla", "Jonathan"] },
        { owner: "Eric", team: "Outwit. Outplay. OutKast.", picks: ["Joe", "Q", "Jonathan", "Coach"] },
        { owner: "CC", team: "Mike White's Fruit Flies", picks: ["Kamilla", "Genevieve", "Dee", "Emily"] },
        { owner: "Brittany", team: "Candice? From Raro Tribe??", picks: ["Q", "Genevieve", "Charlie", "Joe"] },
        { owner: "Nitish", team: "Got Nothing For Ya", picks: ["Devens", "Christian", "Genevieve", "Ozzy"] },
        { owner: "Hunter", team: "Jeff's Midlife Crisis", picks: ["Devens", "Ozzy", "Jonathan", "Q"] },
        { owner: "Emma", team: "The White Lotus Ponderosa", picks: ["Emily", "Genevieve", "Tiffany", "Cirie"] },
        { owner: "Emily", team: "Rachel's Pocket Rice", picks: ["Charlie", "Kyle", "Aubry", "Savannah"] },
        { owner: "Luke", team: "Several Means Seven", picks: ["Rizo", "Angelina", "Charlie", "Kamilla"] },
        { owner: "Brittany R", team: "Candice? From Raro Tribe?? (2)", picks: ["Genevieve", "Aubry", "Charlie", "Tiffany"] },
        { owner: "Luke R", team: "Cancel Christmas! It's Survivor Baby!", picks: ["Aubry", "Jonathan", "Joe", "Jenna"] }
    ];

    /* =========================================================
       LOGIC CORE - AUTOMATICALLY CALCULATES TOTALS
       =========================================================
    */

    function renderSite() {
        const standings = LEAGUE_DATA.map(t => {
            let total = 0;
            t.picks.forEach(p => { total += (SURVIVOR_SCORES[p] || 0); });
            return { ...t, score: total };
        }).sort((a, b) => b.score - a.score);

        // Render Leaderboard
        document.getElementById('tbody-standings').innerHTML = standings.map((s, i) => `
            <tr>
                <td>${i+1}</td>
                <td><strong>${s.owner}</strong></td>
                <td class="hide-mobile">${s.team}</td>
                <td class="num">${s.score}</td>
            </tr>
        `).join('');

        // Render Rosters
        document.getElementById('tbody-teams').innerHTML = standings.map(s => `
            <tr>
                <td><strong>${s.owner}</strong><br><small>${s.team}</small></td>
                <td>${s.picks.join(', ')}</td>
            </tr>
        `).join('');

        // Render Player Scores
        const sortedPlayers = Object.entries(SURVIVOR_SCORES).sort((a,b) => b[1] - a[1]);
        document.getElementById('tbody-players').innerHTML = sortedPlayers.map(p => `
            <tr><td>${p[0]}</td><td class="num">${p[1]}</td></tr>
        `).join('');
    }

    function openTab(id) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.pure-menu-item').forEach(el => el.classList.remove('pure-menu-selected'));
        
        document.getElementById(id).classList.add('active');
        document.getElementById('li-' + id).classList.add('pure-menu-selected');
    }

    renderSite();
</script>
</body>
</html>
