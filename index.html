<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survivor 50 Fantasy</title>
    <link rel="stylesheet" href="https://unpkg.com/system.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { background-color: #555; padding: 20px; display: flex; justify-content: center; font-family: 'Geneva', 'Chicago', sans-serif; }
        .window { width: 100%; max-width: 800px; }
        
        /* Layout for the data */
        .tab-content { display: none; padding: 15px; background: #fff; }
        .tab-content.active { display: block; }
        
        .standard-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .standard-table th { text-align: left; background: #eee; border: 1px solid #000; padding: 5px; font-size: 12px; }
        .standard-table td { border: 1px solid #ccc; padding: 8px 5px; font-size: 14px; }
        
        .num { text-align: right; font-weight: bold; width: 60px; }
        
        #loading-screen { text-align: center; padding: 40px; }
        
        /* Navigation Tabs */
        .nav-bar { display: flex; gap: 2px; background: #ccc; padding: 5px 5px 0 5px; border-bottom: 1px solid #000; }
        .nav-btn { 
            padding: 5px 15px; 
            border: 1px solid #000; 
            border-bottom: none; 
            background: #bbb; 
            cursor: pointer; 
            font-size: 12px;
            border-radius: 5px 5px 0 0;
        }
        .nav-btn.active { background: #fff; font-weight: bold; position: relative; top: 1px; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <button class="close"></button>
        <h1 class="title">Survivor_Fantasy_S50</h1>
    </div>

    <div class="separator"></div>

    <div class="window-pane">
        <div class="nav-bar">
            <button class="nav-btn active" id="btn-standings" onclick="openTab('standings')">Standings</button>
            <button class="nav-btn" id="btn-rosters" onclick="openTab('rosters')">Teams</button>
            <button class="nav-btn" id="btn-players" onclick="openTab('players')">Contestants</button>
            <button class="nav-btn" id="btn-rules" onclick="openTab('rules')">Matrix</button>
        </div>

        <div id="loading-screen">
            <p>Scanning Fiji Data Centers...</p>
            <div class="progress">
                <div class="progress-bar" style="width: 100%"></div>
            </div>
        </div>
