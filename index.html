<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survivor 50 - System 7</title>
    <link rel="stylesheet" href="https://bbenchoff.github.io/pages/system7.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { background-color: #444; padding: 20px; display: flex; justify-content: center; }
        .window { width: 100%; max-width: 700px; margin-top: 50px; }
        
        .tab-content { display: none; padding: 10px; }
        .tab-content.active { display: block; }

        /* Styling for the list views */
        .data-table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #000; }
        .data-table th { background: #ddd; border: 1px solid #000; text-align: left; padding: 5px; font-size: 11px; text-transform: uppercase; }
        .data-table td { border: 1px solid #eee; padding: 8px 5px; font-size: 13px; }
        .pts-col { text-align: right; font-weight: bold; width: 60px; }
        
        .loading-pane { text-align: center; padding: 40px; }
        
        /* Custom buttons for tab switching */
        .tab-bar { display: flex; border-bottom: 1px solid #000; background: #ccc; }
        .tab-btn { padding: 5px 15px; cursor: pointer; border: 1px solid #000; border-bottom: none; margin-right: 2px; background: #bbb; font-size: 12px; }
        .tab-btn.active { background: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <div class="close-button"></div>
        <div class="title-bar-text">Survivor_Fantasy_v7.0</div>
    </div>
    
    <div class="tab-bar">
        <div class="tab-btn active" id="btn-standings" onclick="show('standings')">Standings</div>
        <div class="tab-btn" id="btn-rosters" onclick="show('rosters')">Teams</div>
        <div class="tab-btn" id="btn-players" onclick="show('players')">Scoring</div>
    </div>

    <div class="window-contents">
        <div id="loading" class="loading-pane">
            <p>Scanning Fiji Data Centers...</p>
        </div>

        <div id="standings" class="tab-content">
            <table class="data-table">
                <thead><tr><th>Rank</th><th>League Member</th><th class="pts-col">Score</th></tr></thead>
                <tbody id="tbody-standings"></tbody>
            </table>
        </div>

        <div id="rosters" class="tab-content">
            <table class="data-table">
                <thead><tr><th>Team Name</th><th>Roster</th></tr></thead>
                <tbody id="tbody-rosters"></tbody>
            </table>
        </div>

        <div id="players" class="tab-content">
            <table class="data-table">
                <thead><tr><th>Contestant</th><th class="pts-col">Points</th></tr></thead>
                <tbody id="tbody-players"></tbody>
            </table>
        </div>
    </div>
</div>
